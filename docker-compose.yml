version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  webhook:
    build:
      context: .
      dockerfile: apps/webhook/Dockerfile
    ports:
      - '3000:3000'
    env_file: .env
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    depends_on:
      - redis
